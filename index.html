<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OXXO VR</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #111; }
    a-scene { width: 100vw; height: 100vh; }
    #hud { position: fixed; top: 10px; left: 10px; z-index: 9999;
           background: #000a; color: #fff; padding: 10px; font-family: monospace;
           border-radius: 8px; pointer-events: none; }
  </style>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>
<body>
  <div id="hud">Cargando…</div>

  <a-scene background="color: #111">
    <!-- Debug visible -->
    <a-box position="0 1 -3" color="#ff0000"></a-box>

    <a-assets>
      <a-asset-item id="oxxo" src="./oxxo.glb"></a-asset-item>
    </a-assets>

    <a-entity id="model" gltf-model="#oxxo" visible="false"></a-entity>

    <a-camera id="cam" position="0 1.6 6" look-controls="enabled:false"></a-camera>
  </a-scene>

  <script>
    const hudEl = document.getElementById('hud');
    const modelEl = document.getElementById('model');

    modelEl.addEventListener('model-loaded', () => {
      modelEl.setAttribute('visible', true);
      hudEl.textContent = 'GLB cargado ✅';
      // fuerza escala por si viene enorme
      modelEl.object3D.scale.set(0.3, 0.3, 0.3);
    });

    modelEl.addEventListener('model-error', () => {
      hudEl.textContent = 'ERROR cargando GLB';
    });
  </script>
</body>
</html>
