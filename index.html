<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VR Test</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #111; }
    a-scene { width: 100vw; height: 100vh; }
  </style>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>
<body>
  <a-scene background="color: #111">
    <a-box position="0 1 -3" color="#ff0000"></a-box>
    <a-plane position="0 0 -3" rotation="-90 0 0" width="10" height="10" color="#555"></a-plane>
    <a-camera position="0 1.6 0" look-controls="enabled: false"></a-camera>
  </a-scene>
</body>
</html>
